<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
  <h1>⚔️ RPG GAME</h1>

  <div class="stats">
    <p>❤️ HP: <span id="hp">100</span></p>
    <p>⚔️ Атака: <span id="attack">10</span></p>
    <p>👹 Враг HP: <span id="enemy">50</span></p>
  </div>

  <div class="buttons">
    <button onclick="attack()">⚔️ Атаковать</button>
    <button onclick="heal()">❤️ Лечиться</button>
  </div>

  <p id="log"></p>
</div>

<script src="script.js"></script>
</body>
</html>
